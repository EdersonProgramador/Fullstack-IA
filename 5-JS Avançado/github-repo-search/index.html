<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador de Repositórios no GitHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
    <div class="min-h-screen flex items-center justify-center px-4 py-8">
        <div class="w-full max-w-3xl space-y-6">
            <header class="rounded-3xl bg-slate-900/95 border border-slate-700 p-8 shadow-2xl shadow-slate-950/40">
                <p class="text-sky-400 uppercase text-xs tracking-[0.35em] mb-3">Buscador GitHub</p>
                <h1 class="text-3xl sm:text-4xl font-semibold leading-tight">Encontre repositórios no GitHub</h1>
                <p class="mt-3 text-slate-400">Digite um termo e pressione ENTER para buscar os repositórios mais populares.</p>
            </header>

            <section class="rounded-3xl bg-slate-900/95 border border-slate-700 p-6 shadow-xl shadow-slate-950/30">
                <label for="search-input" class="block text-sm font-medium text-slate-300 mb-2">Pesquisar</label>
                <input id="search-input" type="text" placeholder="Digite o termo para buscar e pressione ENTER" class="w-full rounded-2xl bg-slate-950 border border-slate-700 px-4 py-4 text-slate-100 placeholder-slate-500 focus:border-sky-400 focus:ring-4 focus:ring-sky-500/20 outline-none transition" />
                <p class="mt-3 text-slate-500 text-sm">Exemplo: react, node, tailwind, javascript</p>
            </section>

            <div id="status-cards" class="space-y-4">
                <div id="loading" class="hidden rounded-3xl bg-slate-900/95 border border-slate-700 p-6 flex items-center gap-3">
                    <span class="h-3 w-3 rounded-full animate-pulse bg-sky-400"></span>
                    <p class="text-slate-200">Carregando resultados...</p>
                </div>
                <div id="empty-state" class="hidden rounded-3xl bg-slate-900/95 border border-amber-500/30 p-6 text-amber-200">Nenhum resultado encontrado. Tente outro termo.</div>
                <div id="error-message" class="hidden rounded-3xl bg-rose-900/95 border border-rose-500/20 p-6 text-rose-200"></div>
            </div>

            <div id="results" class="space-y-4"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
